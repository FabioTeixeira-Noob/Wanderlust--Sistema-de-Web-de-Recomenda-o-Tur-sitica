<!DOCTYPE html>
<html lang="pt-AO">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Wanderlust</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login">

  <nav class="navbar scrolled" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="logo-mark">
          <svg viewBox="0 0 16 16"><path d="M8 1L10 6H15L11 9.5L12.5 14.5L8 11.5L3.5 14.5L5 9.5L1 6H6Z"/></svg>
        </div>
        <span class="logo-wordmark">Wander<span>lust</span></span>
      </a>
      <a href="register.html" class="btn btn-primary btn-sm">Criar conta</a>
    </div>
  </nav>

  <div class="auth-page">
    <!-- Visual -->
    <div class="auth-visual">
      <img src="https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=900&q=80" alt="Viagem">
      <div class="auth-visual-overlay"></div>
      <div class="auth-visual-content">
        <h2>Bem-vindo de<br><em>volta, viajante</em></h2>
        <p>Os seus destinos personalizados<br>aguardam por si.</p>
        <div style="display:flex;gap:36px;margin-top:36px">
          <div>
            <strong style="display:block;font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:500;color:var(--white)">500+</strong>
            <span style="font-size:.65rem;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.14em">Destinos</span>
          </div>
          <div>
            <strong style="display:block;font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:500;color:var(--white)">48 mil</strong>
            <span style="font-size:.65rem;color:rgba(255,255,255,.38);text-transform:uppercase;letter-spacing:.14em">Viajantes</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Formulário -->
    <div class="auth-form-side">
      <div class="auth-form-container">
        <div class="auth-logo">
          <div class="logo-mark">
            <svg viewBox="0 0 16 16"><path d="M8 1L10 6H15L11 9.5L12.5 14.5L8 11.5L3.5 14.5L5 9.5L1 6H6Z"/></svg>
          </div>
          <span class="logo-wordmark">Wander<span>lust</span></span>
        </div>

        <h1 class="auth-title">Entrar</h1>
        <p class="auth-sub">Aceda à sua conta para ver recomendações personalizadas.</p>
        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="email">Endereço de email</label>
            <input type="email" id="email" name="email" placeholder="o.seu@email.com" autocomplete="email">
            <span class="error-msg"></span>
          </div>

          <div class="form-group">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" placeholder="A sua senha" autocomplete="current-password">
            <span class="error-msg"></span>
          </div>

          <div class="form-footer">
            <label class="remember-label">
              <input type="checkbox"> Lembrar-me
            </label>
            <a href="#">Esqueceu a senha?</a>
          </div>

          <button type="submit" class="btn btn-primary btn-full">Entrar</button>
        </form>

        <div class="auth-divider">ou continue com</div>

        <div class="social-btns">
          <button class="social-btn" onclick="showToast('Integração disponível em breve.','')">Google</button>
          <button class="social-btn" onclick="showToast('Integração disponível em breve.','')">Facebook</button>
        </div>

        <div class="auth-switch">
          Não tem conta? <a href="register.html">Criar conta gratuita</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
